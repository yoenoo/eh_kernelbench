# Base eval config
defaults:
  - _self_

dataset:
  name: "ScalingIntelligence/KernelBench"

io:
  glob_dir: "results"                           # where generated kernels are saved
  glob_pattern: "kernel_level_*_problem_*_sample_*.py"
  save_report: true
  report_file: "eval_report.jsonl"              # written inside Hydra run dir
  progress_bar: true
  verbose: false

tolerance:
  atol: 1e-2
  rtol: 1e-2

parallel:
  enable: true
  gpus: null           # null => auto-detect; or list: [0,1,2,3]
  workers_per_gpu: 16  # if unsure, keep at 1 (unless you *know* your GPU can handle concurrency)

hydra:
  run:
    dir: outputs
  job:
    chdir: true