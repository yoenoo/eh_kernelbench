# Base composition
defaults:
  - model: qwen3_coder_30b_a3b
  - dataset: kernelbench_level1
  - engine: base
  - generation: reasoning
  - io: default
  - _self_

# Where hydra puts run outputs (cwd changes to this dir)
hydra:
  run:
    dir: outputs/${now:%Y%m%d}/${now:%H%M%S}
  job:
    chdir: true